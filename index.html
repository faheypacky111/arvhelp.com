<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ARV Help">
  <title>ARV Help</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000000'/%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%23000000'/%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background: #0a0a0a; -webkit-tap-highlight-color: transparent; }
    .display-font { font-family: 'Playfair Display', serif; }
    .gold { color: #d4af37; }
    .input-focus { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .input-focus:focus { border-color: #d4af37; box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15); }
    .card { background: rgba(20, 20, 20, 0.98); backdrop-filter: blur(20px); }

    input[type="text"] { font-size: 16px; }
    @media (min-width: 640px) {
      input[type="text"] { font-size: 1.5rem; }
    }
    @media (min-width: 1024px) {
      input[type="text"] { font-size: 1.875rem; }
    }

    body {
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    .comp-card {
      padding: 1rem;
      border-radius: 0.75rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
  </style>
</head>
<body class="min-h-screen text-zinc-200">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 pt-8 sm:pt-16 lg:pt-20 pb-12 sm:pb-24">

    <!-- Address input card -->
    <div class="card rounded-2xl sm:rounded-3xl p-5 sm:p-8 lg:p-12 border border-zinc-800 shadow-2xl">
      <label class="block text-[10px] sm:text-xs uppercase tracking-[2px] sm:tracking-[3px] text-zinc-500 mb-3 sm:mb-4 font-medium">SUBJECT PROPERTY ADDRESS</label>
      <input id="address" type="text" placeholder="923 Hilltop Dr, Milton, WI 53563" autocomplete="off" autocapitalize="words" class="input-focus w-full bg-transparent border border-zinc-700 rounded-xl sm:rounded-2xl px-4 sm:px-6 lg:px-8 py-4 sm:py-6 lg:py-8 outline-none placeholder-zinc-600">

      <button id="runBtn" onclick="runARV()" class="mt-5 sm:mt-8 lg:mt-10 w-full py-4 sm:py-5 lg:py-7 bg-gradient-to-r from-amber-400 via-yellow-500 to-amber-500 hover:brightness-110 active:brightness-95 transition-all duration-300 rounded-xl sm:rounded-2xl text-sm sm:text-lg lg:text-xl font-medium tracking-widest text-black">
        DETERMINE ARV
      </button>
    </div>

    <!-- Error -->
    <div id="error" class="hidden mt-6 p-4 sm:p-6 rounded-xl sm:rounded-2xl border border-red-900 bg-red-950/30 text-red-300 text-sm sm:text-base"></div>

    <!-- Loading -->
    <div id="loading" class="hidden text-center py-16 sm:py-24 lg:py-32">
      <i class="fa-solid fa-spinner fa-spin text-3xl sm:text-4xl lg:text-5xl gold"></i>
      <p class="mt-4 sm:mt-6 lg:mt-8 text-zinc-400 text-sm sm:text-base lg:text-lg tracking-widest">PULLING COMPS...</p>
    </div>

    <!-- Results -->
    <div id="results" class="hidden mt-8 sm:mt-12 lg:mt-20">
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-5 sm:gap-6 lg:gap-8">

        <!-- ARV card -->
        <div class="lg:col-span-5 card rounded-2xl sm:rounded-3xl p-5 sm:p-8 lg:p-12 border border-zinc-800">
          <p class="uppercase text-amber-300 text-[10px] sm:text-xs tracking-[1.5px] sm:tracking-[2px] mb-2">ESTIMATED AFTER-REPAIR VALUE</p>
          <div id="arvMid" class="display-font text-5xl sm:text-6xl lg:text-7xl font-light gold leading-none mt-4 sm:mt-6 mb-1 break-words">—</div>
          <div id="arvRange" class="text-base sm:text-xl lg:text-2xl text-zinc-400">—</div>
          <div id="cachedBadge" class="hidden mt-2 text-[10px] uppercase tracking-widest text-zinc-500">⚡ cached result</div>

          <div class="mt-6 sm:mt-10 lg:mt-12 pt-6 sm:pt-8 lg:pt-10 border-t border-zinc-700">
            <div class="text-[10px] sm:text-xs uppercase tracking-widest text-zinc-500 mb-2">SUBJECT PROPERTY</div>
            <div id="subjectInfo" class="text-zinc-300 text-sm sm:text-base leading-relaxed"></div>
          </div>

          <div class="mt-5 sm:mt-7 pt-5 sm:pt-6 border-t border-zinc-700">
            <div class="text-[10px] sm:text-xs uppercase tracking-widest text-zinc-500 mb-2">METHODOLOGY</div>
            <div id="methodology" class="text-zinc-400 text-xs leading-relaxed"></div>
          </div>
        </div>

        <!-- Comps card -->
        <div class="lg:col-span-7 card rounded-2xl sm:rounded-3xl p-5 sm:p-8 lg:p-12 border border-zinc-800">
          <h2 class="display-font text-2xl sm:text-3xl font-light mb-5 sm:mb-8">Comparable Sales</h2>

          <!-- Table (desktop/tablet) -->
          <div id="compsTable" class="hidden md:block overflow-x-auto"></div>

          <!-- Cards (mobile only) -->
          <div id="compsMobile" class="md:hidden space-y-3"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const EDGE_FUNCTION_URL = 'https://srdkmhvkmgrzvuhxaesb.supabase.co/functions/v1/arv-lookup';
    const SUPABASE_ANON_KEY = 'sb_publishable_Bk7rO3hn513kLHSGwG9DFQ_Cq7moIkp';

    async function runARV() {
      const address = document.getElementById('address').value.trim();
      if (!address) {
        showError('Please enter a property address');
        return;
      }

      document.getElementById('address').blur();

      document.getElementById('error').classList.add('hidden');
      document.getElementById('results').classList.add('hidden');
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('runBtn').disabled = true;

      try {
        const response = await fetch(EDGE_FUNCTION_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify({ address })
        });

        const data = await response.json();

        if (!response.ok || data.error) {
          throw new Error(data.error || 'ARV lookup failed');
        }

        renderResults(data);
      } catch (err) {
        showError(err.message);
      } finally {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('runBtn').disabled = false;
      }
    }

    function renderResults(data) {
      document.getElementById('arvMid').textContent = '$' + data.arv.toLocaleString();
      document.getElementById('arvRange').textContent =
        '$' + data.arvLow.toLocaleString() + ' – $' + data.arvHigh.toLocaleString();

      // Show cached badge if applicable
      if (data.cached) {
        document.getElementById('cachedBadge').classList.remove('hidden');
      } else {
        document.getElementById('cachedBadge').classList.add('hidden');
      }

      // Subject info — handle missing values gracefully + show year built
      const beds = (data.subject.beds && data.subject.beds !== '—') ? data.subject.beds : '—';
      const baths = (data.subject.baths && data.subject.baths !== '—') ? data.subject.baths : '—';
      const yearBuilt = data.subject.yearBuilt ? `· Built ${data.subject.yearBuilt}` : '';

      document.getElementById('subjectInfo').innerHTML =
        `${data.subject.address}<br>` +
        `${beds} bed / ${baths} bath · ${data.subject.sqft.toLocaleString()} sqft ${yearBuilt}`;

      // Methodology — accurate language now
      const ppsf = data.medianPricePerSqft || data.avgPricePerSqft;
      document.getElementById('methodology').textContent =
        `Median $/sqft of ${data.comps.length} closest comps × subject sqft. ` +
        `Range = 25th–75th percentile. Median comp $/sqft: $${ppsf}.`;

      // ---- Desktop/Tablet table view ----
      let tableHtml = `<table class="w-full text-sm"><thead><tr class="border-b border-zinc-700 text-xs uppercase tracking-widest text-zinc-500">
        <th class="text-left py-4">Address</th>
        <th class="text-right py-4">Sold</th>
        <th class="text-right py-4">$/SqFt</th>
        <th class="text-center py-4">Beds/Baths</th>
        <th class="text-right py-4">Sq Ft</th>
        <th class="text-center py-4">Date</th>
      </tr></thead><tbody class="divide-y divide-zinc-800">`;

      data.comps.forEach(c => {
        tableHtml += `<tr class="hover:bg-white/5">
          <td class="py-5 font-light">${escapeHtml(c.address)}</td>
          <td class="py-5 text-right">$${c.soldPrice.toLocaleString()}</td>
          <td class="py-5 text-right text-amber-300">$${c.pricePerSqft}</td>
          <td class="py-5 text-center">${c.beds}/${c.baths}</td>
          <td class="py-5 text-right">${c.sqft.toLocaleString()}</td>
          <td class="py-5 text-center text-zinc-400">${escapeHtml(c.soldDate)}</td>
        </tr>`;
      });
      tableHtml += `</tbody></table>`;
      document.getElementById('compsTable').innerHTML = tableHtml;

      // ---- Mobile card view ----
      let mobileHtml = '';
      data.comps.forEach(c => {
        mobileHtml += `<div class="comp-card">
          <div class="flex justify-between items-start mb-2">
            <div class="text-sm font-light leading-tight pr-3">${escapeHtml(c.address)}</div>
            <div class="text-base text-amber-300 font-medium whitespace-nowrap">$${c.pricePerSqft}/sf</div>
          </div>
          <div class="flex justify-between items-center text-xs text-zinc-400">
            <div>$${c.soldPrice.toLocaleString()} · ${c.beds}/${c.baths} · ${c.sqft.toLocaleString()} sqft</div>
            <div class="whitespace-nowrap ml-2">${escapeHtml(c.soldDate)}</div>
          </div>
        </div>`;
      });
      document.getElementById('compsMobile').innerHTML = mobileHtml;

      document.getElementById('results').classList.remove('hidden');

      if (window.innerWidth < 768) {
        document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function escapeHtml(str) {
      if (str == null) return '';
      return String(str).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function showError(msg) {
      const errEl = document.getElementById('error');
      errEl.textContent = '⚠️ ' + msg;
      errEl.classList.remove('hidden');
    }

    document.getElementById('address').addEventListener('keypress', e => {
      if (e.key === 'Enter') runARV();
    });
  </script>
</body>
</html>
