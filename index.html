<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARV Tool</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      content: [],
      theme: {
        extend: {
          fontFamily: {
            display: ['Playfair Display', 'serif'],
            body: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', system_ui, sans-serif; background: #0a0a0a; }
    .display-font { font-family: 'Playfair Display', serif; }
    .gold { color: #d4af37; }
    .input-focus { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .input-focus:focus { border-color: #d4af37; box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15); transform: scale(1.01); }
    .card { background: rgba(20, 20, 20, 0.98); backdrop-filter: blur(20px); }
  </style>
</head>
<body class="min-h-screen text-zinc-200">
  <div class="max-w-5xl mx-auto px-6 pt-20 pb-24">

    <div class="card rounded-3xl p-12 border border-zinc-800 shadow-2xl">
      <label class="block text-xs uppercase tracking-[3px] text-zinc-500 mb-4 font-medium">SUBJECT PROPERTY ADDRESS</label>
      <input id="address" type="text" placeholder="923 Hilltop Dr, Milton, WI 53563" class="input-focus w-full bg-transparent border border-zinc-700 focus:border-amber-300 rounded-2xl px-8 py-8 text-3xl outline-none placeholder-zinc-600">

      <button onclick="runComps()" class="mt-10 w-full py-7 bg-gradient-to-r from-amber-400 via-yellow-500 to-amber-500 hover:brightness-110 transition-all duration-300 rounded-2xl text-xl font-medium tracking-widest text-black">
        DETERMINE ARV
      </button>
    </div>

    <div id="results" class="hidden mt-20">
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-5 card rounded-3xl p-12 border border-zinc-800">
          <p class="uppercase text-amber-300 text-xs tracking-[2px] mb-2">ESTIMATED AFTER-REPAIR VALUE</p>
          <div id="arvMid" class="display-font text-7xl font-light gold leading-none mt-6 mb-1">$248,000</div>
          <div id="arvRange" class="text-2xl text-zinc-400">$232,000 – $265,000</div>

          <div class="mt-12 pt-10 border-t border-zinc-700 grid grid-cols-2 gap-8">
            <div>
              <div class="text-xs uppercase tracking-widest text-zinc-500 mb-1">MAX OFFER</div>
              <div id="maxOffer" class="display-font text-5xl gold">$186,000</div>
              <div class="text-xs text-zinc-500">(75% Rule)</div>
            </div>
            <div>
              <div class="text-xs uppercase tracking-widest text-zinc-500 mb-1">REPAIR BUDGET</div>
              <div id="repairBudget" class="display-font text-5xl text-zinc-300">$35,000</div>
            </div>
          </div>
        </div>

        <div class="lg:col-span-7 card rounded-3xl p-12 border border-zinc-800">
          <h2 class="display-font text-3xl font-light mb-8">Comparable Sales</h2>
          <div id="compsTable" class="overflow-x-auto"></div>
        </div>
      </div>
    </div>

    <div id="loading" class="hidden text-center py-32">
      <i class="fa-solid fa-spinner fa-spin text-5xl gold"></i>
      <p class="mt-8 text-zinc-400 text-lg tracking-widest">ANALYZING MARKET DATA...</p>
    </div>
  </div>

  <script>
    const demoComps = [
      { address: "456 Oak Avenue", sold: 238000, date: "Mar 2026", beds: "3/2", sqft: 1420, dist: "0.4 mi", adj: "+2%" },
      { address: "789 Pine Road", sold: 252000, date: "Feb 2026", beds: "3/2", sqft: 1380, dist: "0.7 mi", adj: "-1%" },
      { address: "321 Elm Street", sold: 241000, date: "Jan 2026", beds: "4/2", sqft: 1550, dist: "1.1 mi", adj: "+3%" },
      { address: "654 Maple Lane", sold: 255000, date: "Dec 2025", beds: "3/1.5", sqft: 1350, dist: "0.3 mi", adj: "0%" },
      { address: "112 Birch Court", sold: 229000, date: "Mar 2026", beds: "3/2", sqft: 1390, dist: "0.9 mi", adj: "-4%" }
    ];

    function runComps() {
      const address = document.getElementById('address').value.trim();
      if (!address) return alert("Please enter a property address");

      document.getElementById('results').classList.add('hidden');
      document.getElementById('loading').classList.remove('hidden');

      setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('results').classList.remove('hidden');

        const arv = 248000;
        const maxOffer = Math.round(arv * 0.75);

        document.getElementById('arvMid').textContent = '$248,000';
        document.getElementById('arvRange').textContent = '$232,000 – $265,000';
        document.getElementById('maxOffer').textContent = '$' + maxOffer.toLocaleString();
        document.getElementById('repairBudget').textContent = '$35,000';

        let html = `<table class="w-full text-sm"><thead><tr class="border-b border-zinc-700 text-xs uppercase tracking-widest text-zinc-500"><th class="text-left py-4">Address</th><th class="text-right py-4">Sold</th><th class="text-center py-4">Date</th><th class="text-center py-4">Beds/Baths</th><th class="text-right py-4">Sq Ft</th><th class="text-center py-4">Distance</th><th class="text-right py-4">Adj.</th></tr></thead><tbody class="divide-y divide-zinc-800">`;
        demoComps.forEach(c => {
          html += `<tr class="hover:bg-white/5"><td class="py-5 font-light">${c.address}</td><td class="py-5 text-right">$${c.sold.toLocaleString()}</td><td class="py-5 text-center text-zinc-400">${c.date}</td><td class="py-5 text-center">${c.beds}</td><td class="py-5 text-right">${c.sqft}</td><td class="py-5 text-center text-zinc-400">${c.dist}</td><td class="py-5 text-right text-emerald-400">${c.adj}</td></tr>`;
        });
        html += `</tbody></table>`;
        document.getElementById('compsTable').innerHTML = html;
      }, 1100);
    }

    document.getElementById('address').addEventListener('keypress', e => { if (e.key === 'Enter') runComps(); });
    window.onload = () => { document.getElementById('address').value = "923 Hilltop Dr, Milton, WI 53563"; };
  </script>
</body>
</html>
